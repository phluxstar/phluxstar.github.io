<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="robots" content="noindex, nofollow">
<title>Private · New Chapter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;min-height:100vh;display:grid;place-items:center;
background:linear-gradient(150deg,#0f1f3d 0%,#1a2f5e 60%,#253a7a 100%);color:#fff;padding:20px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.35);backdrop-filter:blur(10px);
border-radius:20px;padding:40px 34px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.lock{font-size:40px;margin-bottom:14px}
h1{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:6px}
h1 span{color:#c9a84c}
p.sub{color:#cdd4e3;font-size:14px;margin-bottom:24px}
input{width:100%;padding:13px 16px;border-radius:11px;border:1px solid rgba(201,168,76,.4);
background:rgba(255,255,255,.1);color:#fff;font-size:15px;font-family:inherit;margin-bottom:12px;outline:none}
input:focus{border-color:#c9a84c}
input::placeholder{color:#9aa5bd}
button{width:100%;padding:13px;border-radius:11px;border:none;background:#c9a84c;color:#0f1f3d;
font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:.18s}
button:hover{background:#f5e4a8}
button:disabled{opacity:.6;cursor:wait}
.err{color:#ffb4b4;font-size:13px;margin-top:12px;min-height:18px}
.hint{color:#8893ab;font-size:11.5px;margin-top:18px}
</style>
</head>
<body>
<div class="card">
  <div class="lock">🔒</div>
  <h1>New <span>Chapter</span></h1>
  <p class="sub">This move-in plan is private. Enter the password to continue.</p>
  <form id="f">
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password" autofocus>
    <button type="submit" id="btn">Unlock</button>
  </form>
  <div class="err" id="err"></div>
  <div class="hint">Keep this password between you and Mike.</div>
</div>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pw,silent){
  const err=document.getElementById('err'), btn=document.getElementById('btn');
  if(!silent){btn.disabled=true;btn.textContent='Unlocking…';err.textContent='';}
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
    const html=new TextDecoder().decode(pt);
    try{sessionStorage.setItem('nc_pw',pw);}catch(e){}
    document.open();document.write(html);document.close();
  }catch(e){
    if(!silent){err.textContent='Incorrect password. Try again.';btn.disabled=false;btn.textContent='Unlock';
      try{sessionStorage.removeItem('nc_pw');}catch(_){}}
  }
}
document.getElementById('f').addEventListener('submit',e=>{e.preventDefault();unlock(document.getElementById('pw').value,false);});
(function(){try{const s=sessionStorage.getItem('nc_pw');if(s)unlock(s,true);}catch(e){}})();
</script>
